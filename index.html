<body>

  <div class="cursor" id="cursor"></div>

<div class="grid-wrap">

</div>

  <!-- ABOUT SECTION -->
<div class="about-wrap">
  <div class="about-label">About</div>
  <p class="about-text">
   This digital archive is a curated collection of visual material documenting the early years of Maison Margiela, spanning from 1989 to 1996. 
</div>

<!-- Java Script-->
  <script>
    const cursor = document.getElementById('cursor');

    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    document.querySelectorAll('.year-cell').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('expanded'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('expanded'));
    });
  </script>
</body>
